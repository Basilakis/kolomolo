# Fly.io deployment manifest (hosted-PoC option — see doc/DEPLOYMENT.md / issue #18).
# The free path is the Cloudflare tunnel; this is for a persistently-hosted demo.
#
# Neo4j is NOT hosted here — point at a managed Neo4j Aura Free instance via secrets:
#   fly secrets set ANTHROPIC_API_KEY=... \
#                   NEO4J_URI=neo4j+s://<id>.databases.neo4j.io \
#                   NEO4J_USER=neo4j NEO4J_PASSWORD=<aura-password>
#
# Ingestion is a one-off — run it locally against the same Aura URI to populate the graph,
# then this service only serves queries.

app = "kolomolo"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8501             # Streamlit (Dockerfile binds 0.0.0.0:8501)
  force_https = true
  auto_stop_machines = true        # scale to zero when idle -> minimal cost
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  # sentence-transformers/torch (baseline) is memory-hungry; 2 GB avoids OOM.
  size = "shared-cpu-1x"
  memory = "2gb"

[env]
  # Non-secret defaults only. Secrets (API key, Neo4j creds) go via `fly secrets set`.
  EMBED_MODEL = "sentence-transformers/all-MiniLM-L6-v2"
